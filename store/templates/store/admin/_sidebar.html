<!-- Admin Sidebar -->
<div class="w-64 bg-gray-900 text-white flex-shrink-0">
    <div class="p-6 border-b border-gray-700">
        <h2 class="text-2xl font-bold text-rose-600"><i class="fas fa-crown mr-2"></i>Admin Panel</h2>
    </div>

    <nav class="mt-4 pb-6">
        <p class="px-6 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider">Store</p>
        <a href="{% url 'admin_dashboard' %}" class="block px-6 py-3 hover:bg-gray-800 transition {% if request.resolver_match.url_name == 'admin_dashboard' %}sidebar-active{% endif %}">
            <i class="fas fa-chart-line mr-3"></i>Dashboard
        </a>
        <a href="{% url 'manage_categories' %}" class="block px-6 py-3 hover:bg-gray-800 transition {% if request.resolver_match.url_name == 'manage_categories' %}sidebar-active{% endif %}">
            <i class="fas fa-tags mr-3"></i>Categories
        </a>
        <a href="{% url 'manage_products' %}" class="block px-6 py-3 hover:bg-gray-800 transition {% if request.resolver_match.url_name == 'manage_products' %}sidebar-active{% endif %}">
            <i class="fas fa-box mr-3"></i>Products
        </a>
        <a href="{% url 'add_product' %}" class="block px-6 py-3 hover:bg-gray-800 transition {% if request.resolver_match.url_name == 'add_product' %}sidebar-active{% endif %}">
            <i class="fas fa-plus-circle mr-3"></i>Add Product
        </a>
        <a href="{% url 'manage_users' %}" class="block px-6 py-3 hover:bg-gray-800 transition {% if request.resolver_match.url_name == 'manage_users' %}sidebar-active{% endif %}">
            <i class="fas fa-users mr-3"></i>Users
        </a>

        <p class="px-6 py-2 mt-2 text-xs font-semibold text-gray-500 uppercase tracking-wider">Commerce</p>
        <a href="{% url 'admin_order_list' %}" class="block px-6 py-3 hover:bg-gray-800 transition {% if 'order' in request.resolver_match.url_name %}sidebar-active{% endif %}">
            <i class="fas fa-shopping-bag mr-3"></i>Orders
        </a>
        <a href="{% url 'inventory_dashboard' %}" class="block px-6 py-3 hover:bg-gray-800 transition {% if request.resolver_match.url_name == 'inventory_dashboard' %}sidebar-active{% endif %}">
            <i class="fas fa-warehouse mr-3"></i>Inventory
        </a>

        <p class="px-6 py-2 mt-2 text-xs font-semibold text-gray-500 uppercase tracking-wider">Tools</p>
        <a href="{% url 'ai_panel' %}" class="block px-6 py-3 hover:bg-gray-800 transition {% if request.resolver_match.url_name == 'ai_panel' %}sidebar-active{% endif %}">
            <i class="fas fa-robot mr-3"></i>AI Assistant
        </a>

        <hr class="my-4 border-gray-700 mx-6">
        <a href="{% url 'product_list' %}" class="block px-6 py-3 hover:bg-gray-800 transition text-gray-400">
            <i class="fas fa-home mr-3"></i>Back to Store
        </a>
    </nav>
</div>
