services:
  - type: web
    name: m-cosmetics
    env: python
    region: oregon
    plan: free
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate &&
      python manage.py seed_delivery_zones
    startCommand: gunicorn m_cosmetics_project.wsgi:application --workers 2 --timeout 120
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: m-cosmetics-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.0"
      # Fill these in the Render dashboard after deployment:
      # CONTACT_WHATSAPP, CONTACT_CELL, CONTACT_EMAIL
      # CONTACT_FACEBOOK, CONTACT_TIKTOK
      # PAYNOW_INTEGRATION_ID, PAYNOW_INTEGRATION_KEY
      # AI_API_KEY

databases:
  - name: m-cosmetics-db
    plan: free
    region: oregon
