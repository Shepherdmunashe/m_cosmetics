{% extends 'store/base.html' %}
{% block title %}Payment Error{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto px-4 py-16 text-center">
    <div class="bg-white rounded-2xl shadow-lg p-10">
        <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-times text-red-600 text-4xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Payment Failed</h1>
        <p class="text-gray-500 mb-6">{{ error }}</p>
        <div class="space-y-3">
            <a href="{% url 'order_confirmation' order.id %}"
               class="block w-full py-3 bg-rose-600 text-white font-bold rounded-xl hover:bg-rose-700 transition">
                <i class="fas fa-arrow-left mr-2"></i>Back to Order
            </a>
            <a href="{% url 'product_list' %}"
               class="block w-full py-3 bg-gray-100 text-gray-700 font-semibold rounded-xl hover:bg-gray-200 transition">
                Continue Shopping
            </a>
        </div>
    </div>
</div>
{% endblock %}
